[tools]
python = "3.12"

[settings]
experimental = true
python.uv_venv_auto = true
python.venv_stdlib = false

[env]
_.file = ".env.{{env.MISE_ENV | default(value='development')}}"
COMPOSE_BAKE = "true"

[tasks.format]
description = "format/fix code"
run = [
    "uvx ruff check --fix",
    "uvx ruff format"
]

[tasks.install-frontend]
description = "install frontend dependencies"
run = "cd frontend && bun install"

[tasks.build]
description = "build frontend"
depends = ["install-frontend"]
run = "cd frontend && bun run build"

[tasks.runserver]
depends = ["collectstatic"]
description = "run development server"
run = "npx concurrently --names 'Django,Vite' --prefix-colors 'green,blue' 'DEBUG=true uv run python manage.py runserver' 'cd frontend && bun run dev'"

[tasks.makemigrations]
description = "make migrations"
run = "uv run python manage.py makemigrations"

[tasks.migrate]
description = "migrate"
run = [
    "./scripts/ensure_pg_schema.sh",
    "uv run python manage.py migrate",
    "uv run python manage.py createcachetable"
]

[tasks.flush]
description = "flush database"
run = "uv run python manage.py flush"

[tasks.createsuperuser]
description = "create superuser"
usage = '''
arg "<email>" help="Superuser email address"
arg "<password>" help="Superuser password"
flag "--username <username>" help="Username (defaults to email prefix)"
'''
run = 'DJANGO_SUPERUSER_USERNAME=${usage_username:-${usage_email%%@*}} DJANGO_SUPERUSER_EMAIL=${usage_email?} DJANGO_SUPERUSER_PASSWORD=${usage_password?} uv run python manage.py createsuperuser --noinput'

[tasks.collectstatic]
description = "build theme and collect static files"
depends = ["build"]
run = "uv run python manage.py collectstatic --noinput"

[tasks.test]
description = "run tests"
depends = ["install-frontend"]
env = { DATABASE_URL = "sqlite:///:memory:", LOG_REQUESTS = "false" }
run = [
    "uv run python manage.py test src.core.tests",
    "cd frontend && bun run test:e2e"
]

[tasks.init]
description = "bootstrap project: install deps, migrate, create superuser"
depends = ["install-frontend"]
run = [
    "uv sync",
    "./scripts/ensure_pg_schema.sh",
    "uv run python manage.py migrate",
    "uv run python manage.py createcachetable",
    "uv run python manage.py createsuperuser --noinput || true",
]

[tasks.shell]
description = "django shell"
run = "uv run python manage.py shell"
